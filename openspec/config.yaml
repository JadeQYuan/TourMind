schema: spec-driven

context: |
  # TourMind 智游管家

  面向中小型旅行社的轻量化旅游业务管理平台，以**订单**为核心，串联行程规划、合同签署、财务核算的完整业务链路。并发用户 ≤ 20，单体架构，无分布式需求。

  ## 技术栈

  **前端**
  - Vue 3 + TypeScript + Vite
  - Ant Design Vue 4.x（UI 组件库，使用 `<a-*>` 组件）
  - Pinia（状态管理）
  - Vue Router 4
  - Axios（HTTP 客户端，统一封装在 `src/api/`）
  - vite-plugin-mock（开发期 Mock，Mock 文件在 `mock/` 目录）
  - dayjs（日期处理）

  **后端**
  - Python 3.12 + FastAPI
  - SQLAlchemy 2.x + Alembic（ORM + 迁移）
  - Pydantic v2（数据验证）
  - JWT 认证（python-jose）

  ## 项目结构

  ```
  frontend/src/
    api/          # Axios 封装的 API 调用（contractApi, orderApi 等）
    views/        # 页面组件（按业务模块分目录）
      account/    dashboard/  bill/  contract/
      itinerary/  order/      product/  supplier/  user/
    components/   # 通用组件
    stores/       # Pinia stores
    router/       # 路由配置
    types/        # TypeScript 类型定义
  mock/           # vite-plugin-mock Mock 数据文件
  backend/app/
    routers/      # FastAPI 路由
    models/       # SQLAlchemy 模型
    schemas/      # Pydantic schemas
  ```

  ## 业务模块

  | 模块前缀 | 中文名 | 核心文件 | 说明 |
  |---------|--------|---------|------|
  | `product` | 产品 | `views/product/`, `api/product.ts`, `mock/product.ts` | 旅游产品模板，含行程模板、费用条款，下单时自动带入 |
  | `supplier` | 供应商 | `views/supplier/`, `api/supplier.ts`, `mock/supplier.ts` | 地接社、酒店等供应商管理 |
  | `order` | 订单 | `views/order/`, `api/order.ts`, `mock/order.ts` | 核心模块，关联产品、客户信息、出发日期 |
  | `itinerary` | 行程 | `views/itinerary/`, `api/itinerary.ts`, `mock/itinerary.ts` | 每个订单对应一份行程，含每日明细，支持公开分享（/public/itinerary/:token） |
  | `contract` | 合同 | `views/contract/`, `api/contract.ts`, `mock/contract.ts` | 从订单创建，含签署链接（/sign/:token），状态：pending_sign / signed / revoked |
  | `bill` | 账单 | `views/bill/`, `api/bill.ts`, `mock/bill.ts` | 收入/支出记录，关联订单和供应商 |
  | `account` | 账户 | `views/account/`, `api/account.ts`, `mock/account.ts` | 资金账户管理 |
  | `user` | 用户 | `views/user/`, `api/user.ts`, `mock/user.ts` | 系统用户，角色：admin / operator |
  | `dashboard` | 看板 | `views/dashboard/` | 统计概览，使用 ECharts |

  ## Spec 命名规范

  Spec 名称使用 `<分组>-<模块>-<功能>` 格式（kebab-case）：

  | 分组前缀 | 含义 | 示例 |
  |---------|------|------|
  | `000-` | 全局/基础设施 | `000-global`、`000-auth` |
  | `001-base-` | 基础数据模块 | `001-base-02-product` |
  | `002-biz-` | 核心业务模块 | `002-biz-02-itinerary-form` |
  | `003-ops-` | 运营/后台模块 | `003-ops-01-audit` |

  ## 现有 Specs 索引

  **全局基础设施**：`000-global`（通用 UI、移动端、Mock 防御）、`000-auth`（密码修改、角色权限）

  **基础数据**：`001-base-01-user`（占位）、`001-base-02-product`（产品模板、天数联动）、`001-base-03-supplier`（占位）、`001-base-04-account`（占位）

  **业务模块 - 订单**：`002-biz-01-order`（表单校验、状态由账单推进）

  **业务模块 - 行程**：`002-biz-02-itinerary-form`（表单 UX、模板填充、travelers 字段）、`002-biz-02-itinerary-list`（查看抽屉、编辑加载、状态操作）、`002-biz-02-itinerary-status`（撤销完成、分享码自动生成）

  **业务模块 - 合同**：`002-biz-03-contract-creation`（从订单创建、产品预填）、`002-biz-03-contract-status`（三状态工作流、标签显示）、`002-biz-03-contract-detail`（编辑、详情、签署页）

  **业务模块 - 账单**：`002-biz-04-bill`（支出关联订单/供应商、状态推进）

  **运营后台**：`003-ops-01-audit`（占位）

  ## 编码约定

  - 列表页统一采用"桌面端 Table + 移动端 Card"双视图模式，响应式切换（breakpoint: 768px）
  - 详情查看统一使用右侧 Drawer（宽 480px），不跳转页面
  - 新建/编辑使用 Drawer 内嵌 Form，底部操作栏固定（sticky footer）
  - API 错误统一通过 `message.error()` 提示，不静默吞噬
  - Mock response 函数须对 `params` 和 `params.id` 做防御判断
  - 状态标签全部使用中文，与 `STATUS_LABEL` 映射对应
  - 文件使用 UTF-8 编码（无 BOM）

rules:
  proposal:
    - 使用中文撰写
    - 保持简洁，Why / What Changes / Impact 三段结构
    - 在 Impact 中注明涉及的业务模块
  spec:
    - Spec 名称遵循 `<模块前缀>-<功能描述>` 命名规范
    - 每个 Requirement 须有至少一个 Scenario 用于验收
  tasks:
    - 使用中文撰写
    - 每个 task 独立可执行，明确指出要修改的文件路径（含模块目录）
    - 按模块分组：先处理单模块变更，再处理跨模块影响
    - 优先前端任务，后端任务单独列出
