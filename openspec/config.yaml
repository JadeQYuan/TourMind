references:
  - specs/global/spec.md
  - specs/ui/spec.md
schema: spec-driven

context: |
  # TourMind 智游管家

  面向中小旅行社的轻量化旅游业务管理平台，以“订单”为核心，串联行程、合同、财务全链路。单体架构，并发用户≤20，无分布式需求。

  ## 技术栈
  - 前端：Vue3 + TypeScript + Vite，Ant Design Vue 4.x，Pinia，Vue Router 4，Axios（统一封装于 src/api/），vite-plugin-mock（mock/），dayjs
  - 后端：Python 3.12 + FastAPI，SQLAlchemy 2.x + Alembic，Pydantic v2，JWT（python-jose）
  - 中间件：PostgreSQL（推荐 15.x 及以上）

  ## 项目结构
  - frontend/src/
    - api/        # API 封装
    - views/      # 页面组件（按模块分）
    - components/ # 通用组件
    - stores/     # Pinia stores
    - router/     # 路由
    - types/      # TS 类型
  - mock/         # Mock 数据
  - backend/app/
    - routers/    # FastAPI 路由
    - models/     # SQLAlchemy 模型
    - schemas/    # Pydantic schemas


  ## 业务模块
  | 模块前缀    | 中文名 | 说明 |
  |-------------|--------|------|
  | product     | 产品   | 旅游产品模板，下单时自动带入 |
  | supplier    | 供应商 | 供应商管理 |
  | order       | 订单   | 关联产品、客户、出发日期 |
  | itinerary   | 行程   | 每订单一份行程，支持分享 |
  | contract    | 合同   | 订单生成合同，含签署链接 |
  | bill        | 账单   | 收支记录，关联订单/供应商 |
  | account     | 账户   | 资金账户管理 |
  | user        | 用户   | 系统用户，角色：admin/operator |
  | dashboard   | 看板   | 统计概览 |


  ## 编码约定
  - 文件编码：UTF-8（无 BOM）
  - 全局规范详见 specs/global/spec.md
  - 前端布局、交互、表单、表格等 UI 规范详见 specs/ui/spec.md

rules:
  proposal:
    - 中文撰写，结构为 Why / What Changes / Impact
    - Impact 必须注明涉及业务模块
  spec:
    - 中文撰写，每个 Requirement 至少有一个 Scenario
    - Scenario 用 Given / When / Then，输入输出明确
    - 变更需注明涉及模块及具体文件路径
  tasks:
    - 中文撰写，每个 task 独立可执行，需明确文件路径（含模块目录）
    - 按模块分组，先单模块后跨模块
    - 前端优先，后端任务单独列出
