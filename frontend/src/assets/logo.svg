<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 44" width="172" height="44" role="img" aria-label="智游管家 TourMind">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1677ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1677ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- ── 图标部分 ─────────────────────────────────── -->
  <rect width="44" height="44" rx="10" fill="url(#iconBg)"/>

  <!-- 目的地图钉 -->
  <path d="M27 5 C22 5,17 9,17 14 C17 20,27 28,27 28 C27 28,37 20,37 14 C37 9,32 5,27 5 Z"
    fill="white"/>
  <circle cx="27" cy="13.5" r="4.5" fill="url(#iconBg)"/>

  <!-- 路线 -->
  <path d="M9 33 C9 22,19 25,27 28"
    stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- 出发点 -->
  <circle cx="9" cy="35.5" r="3.2" fill="white" opacity="0.95"/>

  <!-- ── 文字部分 ─────────────────────────────────── -->
  <!-- 主标题：智游管家 -->
  <text
    x="54" y="24"
    font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif"
    font-size="18" font-weight="700"
    fill="#1e293b">智游管家</text>

  <!-- 副标题：TourMind -->
  <text
    x="55" y="39"
    font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
    font-size="11" font-weight="400" letter-spacing="1"
    fill="#64748b">TourMind</text>

  <!-- 主标题渐变装饰线 -->
  <rect x="54" y="28" width="116" height="1.5" rx="1" fill="url(#textGrad)" opacity="0.2"/>
</svg>
